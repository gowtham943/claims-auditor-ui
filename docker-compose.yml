services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8000}
    container_name: claims_auditor_ui
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${UI_PORT:-3000}:80"
